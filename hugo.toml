################################
# Basic
################################
baseURL = 'https://kng-mtd.github.io/hugo0/'   # your site URL
title = 'My Notes'                 # site title
languageCode = 'ja'               # language
#languageCode = 'en-us'             # language
theme = 'PaperMod'                # theme name

################################
# Params (PaperMod settings)
################################
[params]
  mainSections = ['posts']

  author = "kengo"
  description = "Simple notes site"

  ################################
  # UI Behavior
  ################################
  ShowReadingTime = false         # reading time
  ShowToc = false                 # table of contents
  TocOpen = false
  ShowBreadCrumbs = false         # breadcrumb
  ShowPostNavLinks = false        # prev/next
  ShowShareButtons = false        # SNS buttons

  ################################
  # Theme
  ################################
  defaultTheme = "auto"           # light / dark / auto

  ################################
  # Home
  ################################
  [params.homeInfoParams]
    Title = "My Notes"
    Content = "Lightweight Hugo + PaperMod"
################################
# Pagination
################################
[pagination]
  pagerSize = 10                  # posts per page

################################
# Enable robots.txt (SEO)
################################
enableRobotsTXT = true

################################
# Taxonomy (tags / categories)
################################
[taxonomies]
  tag = "tags"
  category = "categories"

################################
# Menu (top navigation)
################################
[[menu.main]]
  name = "Notes"                  # display name
  url = "/posts/"                 # path
  weight = 1                      # order

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 2

################################
# Markdown / Rendering
################################
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true               # allow raw HTML

  [markup.highlight]
    style = "github"              # code highlight style
    noClasses = false

################################
# Outputs
################################
[outputs]
  home = ["HTML", "RSS", "JSON"]

################################
# Development Server
################################
[server]
  port = 1313

################################
# Optional
################################
# enableGitInfo = true # Git information

